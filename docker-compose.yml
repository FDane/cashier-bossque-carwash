version: '3.8'

services:
  # Next.js Development Server
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bossque-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - firebase-emulator
    networks:
      - bossque-network

  # Firebase Emulator (Optional - for local development)
  firebase-emulator:
    image: google/firebase-emulator-suite:latest
    container_name: firebase-emulator
    ports:
      - "4000:4000"  # Emulator UI
      - "5000:5000"  # Firebase functions
      - "8080:8080"  # Firestore
      - "9099:9099"  # Firebase Auth
    environment:
      - FIREBASE_DATABASE_EMULATOR_HOST=0.0.0.0:9000
      - FIRESTORE_EMULATOR_HOST=0.0.0.0:8080
    volumes:
      - ./firebase-seed:/seed
    networks:
      - bossque-network

networks:
  bossque-network:
    driver: bridge
